services:
  apacheds:
    image: andriykalashnykov/apacheds-ad:latest
    restart: unless-stopped
    hostname: ${LDAP_SERVER_HOST}
    container_name: ${LDAP_SERVER_HOST}
    ports:
      - "10389:${LDAP_SERVER_PORT}"
    volumes:
      - ./ldif:/ldap/ldif
    command: ""   
    networks:
      ldap_net:
        ipv4_address: ${IPV4_ADDRESS_PREFIX}.2.10
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
  phpldapadmin:
    # Maintained leenooks fork (Laravel rewrite); serves HTTP on 8080.
    image: phpldapadmin/phpldapadmin:2.3.11
    hostname: ${PHPLDAPADMIN_SERVER_HOST}
    container_name: ${PHPLDAPADMIN_SERVER_HOST}
    depends_on:
      - ${LDAP_SERVER_HOST}
    ports:
      - "${PHPLDAPADMIN_HOST_PORT:-6443}:8080"
    environment:
      - LDAP_HOST=ldap://${LDAP_SERVER_HOST}:${LDAP_SERVER_PORT}
    networks:
      ldap_net:
        ipv4_address: ${IPV4_ADDRESS_PREFIX}.2.11
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
networks:
  ldap_net:
    ipam:
      driver: default
      config:
        - subnet: ${IPV4_ADDRESS_PREFIX}.0.0/16
