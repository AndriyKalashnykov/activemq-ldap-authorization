name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter lists changed files via the API on PR events

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Detect whether this change touches anything that needs the build/test/e2e
  # jobs. Doc-only changes (README, LICENSE, .md) skip the heavy jobs but still
  # let `ci-pass` go green so a Repository-Ruleset required check is satisfied.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # `base` is ignored on pull_request events (the PR base is used); set
          # it only on push so branch pushes and `make ci-run` diff master.
          base: ${{ github.event_name == 'push' && 'master' || '' }}
          filters: |
            code:
              - '6.2.6/**'
              - 'samba/**'
              - 'openldap/**'
              - 'hawtio/**'
              - 'apacheds-ad/**'
              - 'scripts/**'
              - 'e2e/**'
              - 'tests/**'
              - '.env.example'
              - 'Makefile'
              - '.mise.toml'
              - '.hadolint.yaml'
              - '.trivyignore'
              - '.github/workflows/**'
              - 'CLAUDE.md'   # project config, not docs — must trigger CI (§15c)

  static-check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Static check
        run: make static-check

  docker:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./6.2.6
            dockerfile: ./6.2.6/Dockerfile
            image: activemq-ldap:scan
          - context: ./samba
            dockerfile: ./samba/Dockerfile
            image: samba-ad:scan
          - context: ./openldap
            dockerfile: ./openldap/Dockerfile
            image: activemq-openldap:scan
          - context: ./hawtio
            dockerfile: ./hawtio/Dockerfile
            image: activemq-hawtio:scan
          - context: ./apacheds-ad
            dockerfile: ./apacheds-ad/Dockerfile
            image: apacheds-ad:scan

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Build image for scan
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        load: true
        tags: ${{ matrix.image }}

    - name: Trivy image scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ matrix.image }}
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        # BLOCKING gate. ActiveMQ 6.2.6 bundles patched Spring 6.2.x, clearing 4
        # of the 5 EOL CVEs 5.19.6 carried; dormant camel jars + the Canonical
        # `pebble` base binary are removed; samba/openldap/apacheds apt-upgrade
        # their bases (all scan clean). The single residual — jetty-http
        # CVE-2026-2332, fixed only in Jetty 12 (6.2.6 bundles Jetty 11) — is
        # documented + waived in .trivyignore. Hard-fails on any new fixable CVE.
        exit-code: '1'
        trivyignores: .trivyignore
        vuln-type: os,library

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Test
      run: make test

  e2e:
    needs: [changes, docker, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Build broker image
      run: docker build -t andriykalashnykov/docker-activemq:6.2.6 ./6.2.6

    - name: E2E
      run: make e2e

  e2e-samba:
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: E2E Samba
      # Builds the image (build-samba) then provisions a real DC and asserts it
      # serves the AD directory over LDAP. The DC container runs --privileged
      # (sysvol NT-ACL xattrs); GitHub-hosted runners allow it.
      run: make e2e-samba

  e2e-apacheds:
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: E2E Apache DS
      # Builds the image (build-apacheds) then runs it with the AD seed and
      # asserts an authenticated bind reads the Microsoft-schema directory.
      run: make e2e-apacheds

  # Single required status check. With `if: always()` it runs even when the
  # heavy jobs are skipped (doc-only change) — skipped != failure, so it stays
  # green and a Ruleset/branch-protection rule can require just `ci-pass`.
  ci-pass:
    needs: [changes, static-check, docker, test, e2e, e2e-samba, e2e-apacheds]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A required job did not succeed."; exit 1
            fi
          done
          echo "All required jobs succeeded or were skipped."
