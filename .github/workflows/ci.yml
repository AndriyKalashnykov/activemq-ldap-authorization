name: CI

on:
  push:
    branches: [ master ]
    # Image build + Trivy CVE scan (the `docker` job) runs ONLY on tag pushes —
    # i.e. at release time. A freshly-disclosed CVE in a base image or bundled
    # jar would otherwise red-X every unrelated PR (a vuln-DB drift gate's inputs
    # span the images, not the PR diff); gating the scan on tags keeps PR CI
    # about the change under review. Functional correctness (incl. image builds)
    # is still gated on every PR via the e2e jobs, which build the images.
    tags: [ '*' ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter lists changed files via the API on PR events

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Detect whether this change touches anything that needs the build/test/e2e
  # jobs. Doc-only changes (README, LICENSE, .md) skip the heavy jobs but still
  # let `ci-pass` go green so a Repository-Ruleset required check is satisfied.
  changes:
    # Path filtering is only meaningful for branch/PR events. Tag pushes run the
    # release-time `docker` scan unconditionally, so `changes` (and the
    # branch/PR-only jobs that depend on it) are skipped on tags.
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # `base` is ignored on pull_request events (the PR base is used); set
          # it only on push so branch pushes and `make ci-run` diff master.
          base: ${{ github.event_name == 'push' && 'master' || '' }}
          filters: |
            code:
              - '6.2.6/**'
              - 'samba/**'
              - 'openldap/**'
              - 'hawtio/**'
              - 'apacheds-ad/**'
              - 'scripts/**'
              - 'e2e/**'
              - 'tests/**'
              - '.env.example'
              - 'Makefile'
              - '.mise.toml'
              - '.hadolint.yaml'
              - '.trivyignore'
              - '.github/workflows/**'
              - 'CLAUDE.md'   # project config, not docs — must trigger CI (§15c)
              - 'docs/diagrams/**/*.puml'   # C4 source — must run diagrams-check drift gate

  static-check:
    needs: changes
    # Runs when code changed (branch/PR) OR on any tag push (release): a release
    # build must be lint-clean before it is built + scanned. The `!cancelled()`
    # status function is required so this still runs on a tag push, where the
    # `changes` job is skipped (a plain `if:` would inherit an implicit
    # success(changes) gate and skip too).
    if: ${{ !cancelled() && (needs.changes.outputs.code == 'true' || github.ref_type == 'tag') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Static check
        run: make static-check

  # Build all five images + Trivy CVE scan. Gated to TAG pushes only (release
  # time) — see the `on:` block. Runs AFTER static-check (which also runs on
  # tags): lint must pass before a release is built + scanned. The `if:` MUST use
  # a status function (`!cancelled()`) + an explicit `needs.static-check.result`
  # check: a plain `if:` here inherits an implicit success() gate that — because
  # static-check is ITSELF conditionally gated (it runs via `!cancelled()`) —
  # evaluates such that docker is SKIPPED on the tag (observed empirically). The
  # explicit form runs docker iff static-check succeeded and it's a tag push, so
  # a lint failure still skips the build rather than scanning bad images.
  docker:
    needs: static-check
    if: ${{ !cancelled() && needs.static-check.result == 'success' && github.event_name == 'push' && github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./6.2.6
            dockerfile: ./6.2.6/Dockerfile
            image: activemq-ldap:scan
          - context: ./samba
            dockerfile: ./samba/Dockerfile
            image: samba-ad:scan
          - context: ./openldap
            dockerfile: ./openldap/Dockerfile
            image: activemq-openldap:scan
          - context: ./hawtio
            dockerfile: ./hawtio/Dockerfile
            image: activemq-hawtio:scan
          - context: ./apacheds-ad
            dockerfile: ./apacheds-ad/Dockerfile
            image: apacheds-ad:scan

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Build image for scan
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        load: true
        tags: ${{ matrix.image }}

    - name: Trivy image scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ matrix.image }}
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        # BLOCKING release-time gate (this job runs on tag pushes only).
        # ActiveMQ 6.2.6 bundles patched Spring 6.2.x, clearing 4 of the 5 EOL
        # CVEs 5.19.6 carried; dormant camel/shiro jars + the Canonical `pebble`
        # base binary are removed; the bundled jackson-databind is upgraded to a
        # patched release in 6.2.6/Dockerfile + hawtio/Dockerfile;
        # samba/openldap/apacheds apt-upgrade their bases (all scan clean). The
        # single residual — jetty-http CVE-2026-2332, fixed only in Jetty 12
        # (6.2.6 bundles Jetty 11) — is documented + waived in .trivyignore.
        # Hard-fails the release on any new fixable CVE.
        exit-code: '1'
        trivyignores: .trivyignore
        vuln-type: os,library

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Test
      run: make test

  e2e:
    # Does NOT depend on `docker` (now tag-only): e2e builds the broker image
    # itself below, so it gates image build + functional correctness on every PR.
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Build broker image
      run: docker build -t andriykalashnykov/docker-activemq:6.2.6 ./6.2.6

    - name: E2E
      run: make e2e

  e2e-samba:
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: E2E Samba
      # Builds the image (build-samba) then provisions a real DC and asserts it
      # serves the AD directory over LDAP. The DC container runs --privileged
      # (sysvol NT-ACL xattrs); GitHub-hosted runners allow it.
      run: make e2e-samba

  e2e-apacheds:
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: E2E Apache DS
      # Builds the image (build-apacheds) then runs it with the AD seed and
      # asserts an authenticated bind reads the Microsoft-schema directory.
      run: make e2e-apacheds

  # Single required status check. With `if: always()` it runs even when the
  # heavy jobs are skipped (doc-only change) — skipped != failure, so it stays
  # green and a Ruleset/branch-protection rule can require just `ci-pass`.
  ci-pass:
    needs: [changes, static-check, docker, test, e2e, e2e-samba, e2e-apacheds]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A required job did not succeed."; exit 1
            fi
          done
          echo "All required jobs succeeded or were skipped."
