name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./5.19.6
            dockerfile: ./5.19.6/Dockerfile
            image: activemq-ldap:scan
            scan: true
          - context: ./samba
            dockerfile: ./samba/Dockerfile
            image: samba-ad:scan
            scan: true

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Build image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        load: true
        tags: ${{ matrix.image }}

    - name: Trivy image scan
      if: ${{ matrix.scan }}
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ matrix.image }}
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        # Report-only: the base (EOL JDK 8) and pinned ActiveMQ/Jetty/ldaptive
        # carry known CVEs tracked in CLAUDE.md's upgrade backlog. Flip to '1'
        # once those upgrades land so the scan becomes a blocking gate.
        exit-code: '0'
        vuln-type: os,library

  test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Unit tests (bats — config templating)
      run: make test

    - name: Mermaid lint (README C4 diagram)
      run: make mermaid-lint

  e2e:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Build broker image
      run: docker build -t andriykalashnykov/docker-activemq:5.19.6 ./5.19.6

    - name: E2E (LDAP authN/authZ contract)
      run: make e2e
