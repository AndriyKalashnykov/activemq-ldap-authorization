name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./5.19.6
            dockerfile: ./5.19.6/Dockerfile
            image: activemq-ldap:scan
            scan: true
          - context: ./samba
            dockerfile: ./samba/Dockerfile
            image: samba-ad:scan
            scan: true

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Build image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        load: true
        tags: ${{ matrix.image }}

    - name: Trivy image scan
      if: ${{ matrix.scan }}
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ matrix.image }}
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        # Report-only: ActiveMQ-bundled transitive jars (camel-core, spring,
        # jetty-http) plus a base-image Go stdlib binary carry known fixable
        # CVEs tracked in CLAUDE.md's upgrade backlog (none is the cleared
        # CVE-2023-46604 RCE). Flip to '1' once those are triaged/overridden.
        exit-code: '0'
        vuln-type: os,library

  test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Unit tests (bats — config templating)
      run: make test

    - name: Mermaid lint (README C4 diagram)
      run: make mermaid-lint

  e2e:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Build broker image
      run: docker build -t andriykalashnykov/docker-activemq:5.19.6 ./5.19.6

    - name: E2E (LDAP authN/authZ contract)
      run: make e2e

  e2e-samba:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: E2E (Samba AD domain controller serves LDAP)
      # Builds the image (build-samba) then provisions a real DC and asserts
      # it serves the AD directory over LDAP. The DC container runs
      # --privileged (sysvol NT-ACL xattrs); GitHub-hosted runners allow it.
      run: make e2e-samba
