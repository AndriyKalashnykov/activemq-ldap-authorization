name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./6.2.6
            dockerfile: ./6.2.6/Dockerfile
            image: activemq-ldap:scan
            scan: true
          - context: ./samba
            dockerfile: ./samba/Dockerfile
            image: samba-ad:scan
            scan: true
          - context: ./openldap
            dockerfile: ./openldap/Dockerfile
            image: activemq-openldap:scan
            scan: true
          - context: ./hawtio
            dockerfile: ./hawtio/Dockerfile
            image: activemq-hawtio:scan
            scan: true

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Build image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        load: true
        tags: ${{ matrix.image }}

    - name: Trivy image scan
      if: ${{ matrix.scan }}
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ matrix.image }}
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        # BLOCKING gate. ActiveMQ 6.2.6 bundles patched Spring 6.2.x, clearing 4
        # of the 5 EOL CVEs 5.19.6 carried; dormant camel jars + the Canonical
        # `pebble` base binary are removed; samba/openldap apt-upgrade their
        # bases (both scan clean). The single residual — jetty-http CVE-2026-2332,
        # fixed only in Jetty 12 (6.2.6 bundles Jetty 11) — is documented + waived
        # in .trivyignore. The gate hard-fails on any new fixable CVE.
        exit-code: '1'
        trivyignores: .trivyignore
        vuln-type: os,library

  test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Unit tests (bats — config templating)
      run: make test

    - name: Mermaid lint (README C4 diagram)
      run: make mermaid-lint

  e2e:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Build broker image
      run: docker build -t andriykalashnykov/docker-activemq:6.2.6 ./6.2.6

    - name: E2E (LDAP authN/authZ contract)
      run: make e2e

  e2e-samba:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: E2E (Samba AD domain controller serves LDAP)
      # Builds the image (build-samba) then provisions a real DC and asserts
      # it serves the AD directory over LDAP. The DC container runs
      # --privileged (sysvol NT-ACL xattrs); GitHub-hosted runners allow it.
      run: make e2e-samba
