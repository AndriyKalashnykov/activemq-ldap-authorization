services:
  openldap:
    image: osixia/openldap:1.5.0
    restart: unless-stopped
    hostname: openldap
    container_name: openldap
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - $PWD/ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom
    environment:
      - LDAP_DOMAIN=activemq.apache.org
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - LDAP_ORGANISATION="Apache ActiveMQ Test Org"
      - LDAP_ROOTPASS=admin     
      - LDAP_ADMIN_PASSWORD=admin
    command: "--loglevel info --copy-service"   
    networks:
      ldap_net:
        ipv4_address: 172.28.1.10
    logging:
      driver: "json-file"
      options:
        max-size: "100M"
        max-file: "5"
  ldap-account-manager:
    # Maintained LAM image moved from Docker Hub (frozen at 8.3, 2023) to GHCR.
    image: ghcr.io/ldapaccountmanager/lam:9.5
    restart: unless-stopped
    hostname: lam
    container_name: lam    
    depends_on:
      - openldap
    ports:
      - "8080:80"
      - "6443:6443"
    environment:
      - LAM_PASSWORD=${LAM_PASSWORD}
      - LAM_LANG=en_US
      - LDAP_SERVER=${LDAP_SERVER}
      - LDAP_DOMAIN=${LDAP_DOMAIN}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - ADMIN_USER=cn=admin,${LDAP_BASE_DN}
      - DEBUG=true
    networks:
      ldap_net:
        ipv4_address: 172.28.1.11      
  phpldapadmin:
    # Maintained leenooks fork (Laravel rewrite); serves HTTP on 8080.
    image: phpldapadmin/phpldapadmin:2.3.11
    hostname: phpldapadmin
    container_name: phpldapadmin
    depends_on:
      - openldap
    ports:
      - "6543:8080"
    environment:
      - LDAP_HOST=ldap://openldap:389
    networks:
      ldap_net:
        ipv4_address: 172.28.1.12
networks:
  ldap_net:
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
