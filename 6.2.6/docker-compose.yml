services:
  openldap:
    # Minimal image built from Symas's maintained OpenLDAP packages (replaces
    # the unmaintained osixia/openldap:1.5.0). Suffix dc=activemq,dc=apache,dc=org
    # is derived from LDAP_DOMAIN; the seed LDIF is slapadd'd from /seed.
    build: ../openldap
    image: ${OPENLDAP_IMAGE:-activemq-openldap:latest}
    restart: unless-stopped
    hostname: ${LDAP_SERVER_HOST}
    container_name: ${LDAP_SERVER_HOST}
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ../openldap/ldif:/seed:ro
    environment:
      - LDAP_DOMAIN=${LDAP_DOMAIN}
      - LDAP_ORGANISATION=${LDAP_ORGANISATION}
      - LDAP_ADMIN_PASSWORD=${LDAP_USER_PWD}
    networks:
      ldap_net:
        ipv4_address: 172.28.1.10
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
  activemq:
    image: andriykalashnykov/docker-activemq:6.2.6
    restart: unless-stopped
    hostname: activemq
    container_name: activemq    
    depends_on:
      - ${LDAP_SERVER_HOST}
    ports:
      - "1883:1883"
      - "5672:5672"
      - "8161:8161"
      - "61613:61613"
      - "61614:61614"
      - "61616:61616" 
    environment:
      - LDAP_HOST=${LDAP_SERVER_HOST}
      - LDAP_PORT=${LDAP_SERVER_PORT}
      - LDAP_CONN_USER=${LDAP_USER}
      - LDAP_CONN_USER_PWD=${LDAP_USER_PWD}
      - LDAP_QUEUE_SEARCH_BASE=${LDAP_QUEUE_SEARCH_BASE}
      - LDAP_TOPIC_SEARCH_BASE=${LDAP_TOPIC_SEARCH_BASE}
      - LDAP_TEMP_SEARCH_BASE=${LDAP_TEMP_SEARCH_BASE}
      - LDAP_REFRESH_INTERVAL=${LDAP_REFRESH_INTERVAL}
      - LDAP_LEGACY_GROUP_MAPPING=${LDAP_LEGACY_GROUP_MAPPING}
      - LDAP_USER_BASE=${LDAP_USER_BASE}
      - LDAP_ROLE_BASE=${LDAP_ROLE_BASE}
      - OPTS_MEMORY=${ACTIVEMQ_OPTS_MEMORY}
      - PERCENT_JVM_HEAP=${ACTIVEMQ_PERCENT_JVM_HEAP}
      - STORE_USAGE=${ACTIVEMQ_STORE_USAGE}
      - TEMP_USAGE=${ACTIVEMQ_TEMP_USAGE}
      - DEBUG=true
    networks:
      ldap_net:
        ipv4_address: 172.28.1.11
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
  hawtio:
    # Standalone hawtio management console (Tomcat 11 + hawtio 5.x), LDAP-secured
    # via the SAME LDAPLogin realm as the broker (hawtio/Dockerfile). Console UI
    # at http://localhost:${HAWTIO_HOST_PORT:-8090}/hawtio/ — log in with LDAP
    # creds; then use the Connect tab to manage the broker's (also LDAP-secured)
    # Jolokia at http://activemq:8161/api/jolokia.
    build: ../hawtio
    image: ${HAWTIO_IMAGE:-activemq-hawtio:latest}
    restart: unless-stopped
    hostname: hawtio
    container_name: hawtio
    depends_on:
      - ${LDAP_SERVER_HOST}
      - activemq
    ports:
      - "${HAWTIO_HOST_PORT:-8090}:8080"
    environment:
      - LDAP_HOST=${LDAP_SERVER_HOST}
      - LDAP_PORT=${LDAP_SERVER_PORT}
      - LDAP_CONN_USER=${LDAP_USER}
      - LDAP_CONN_USER_PWD=${LDAP_USER_PWD}
      - LDAP_USER_BASE=${LDAP_USER_BASE}
      - LDAP_ROLE_BASE=${LDAP_ROLE_BASE}
    networks:
      ldap_net:
        ipv4_address: 172.28.1.13
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
  phpldapadmin:
    # Maintained leenooks fork (Laravel rewrite) of phpLDAPadmin; serves HTTP
    # on 8080 (the old osixia image terminated TLS on 443 itself).
    image: phpldapadmin/phpldapadmin:2.3.11
    hostname: phpldapadmin
    container_name: phpldapadmin
    depends_on:
      - openldap
    ports:
      - "${PHPLDAPADMIN_HOST_PORT:-6443}:8080"
    environment:
      - LDAP_HOST=ldap://${LDAP_SERVER_HOST}:${LDAP_SERVER_PORT}
    networks:
      ldap_net:
        ipv4_address: 172.28.1.12
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
networks:
  ldap_net:
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
